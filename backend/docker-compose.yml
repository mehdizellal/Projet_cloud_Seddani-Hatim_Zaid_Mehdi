version: '3.8'

services:
  # 1. The Database Service
  mongo:
    image: mongo:latest
    container_name: ismo-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db # Keeps data safe even if the container stops

  # 2. Your Node.js Backend Service
  backend:
    build: .
    container_name: ismo-backend
    ports:
      - "5000:5000"
    environment:
      # Notice the magic here: instead of "localhost", we use the service name "mongo"
      - MONGO_URI=mongodb://mongo:27017/ismo_db
      - PORT=5000
      - JWT_SECRET=ismo_secret_key_for_testing
    depends_on:
      - mongo # Tells Docker to start MongoDB before the backend

volumes:
  mongo_data: